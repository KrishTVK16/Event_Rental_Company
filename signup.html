<!doctype html>
<html lang="en" data-bs-theme="light" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Signup — EventRent." />
    <title>Signup — EventRent</title>
    <link rel="canonical" href="signup.html" />
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />

    <link
      id="bsLtr"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      id="bsRtl"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css"
      rel="stylesheet"
      disabled
    />
    <link href="assets/css/theme.css" rel="stylesheet" />
  </head>
  <body class="d-flex flex-column">
    <main
      class="flex-grow-1 d-flex align-items-start justify-content-center min-vh-100 py-4"
    >
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-10 col-lg-6">
            <div class="card card-soft p-4">
              <div class="er-media er-media-4x3 er-media-rounded er-media-tint-4 mb-3"></div>
              <div class="text-center mb-3">
                <a
                  class="d-inline-flex align-items-center gap-2 brand-link"
                  href="index.html"
                  aria-label="EventRent"
                >
                  <span class="brand-mark" aria-hidden="true">
                    <svg
                      width="20"
                      height="20"
                      viewBox="0 0 24 24"
                      fill="none"
                      xmlns="http://www.w3.org/2000/svg"
                    >
                      <path
                        d="M7 3v3M17 3v3"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                      />
                      <path
                        d="M4 7h16"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                      />
                      <path
                        d="M6 21h12a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2Z"
                        stroke="currentColor"
                        stroke-width="2"
                      />
                      <path
                        d="M8.5 12.5 10.5 14.5 15.5 9.5"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      />
                    </svg>
                  </span>
                  <span class="brand-text"
                    ><span class="name">EventRent</span></span
                  >
                </a>
              </div>
              <div style="text-align: center;">
              <h1 class="h3 mb-1">Create account</h1>
              <p class="text-body-secondary">
                Sign up to save quotes and request bookings.
              </p>
            </div>

              <form
                class="row g-3"
                onsubmit="return false;"
                aria-label="Signup form"
              >
                <div class="col-md-6">
                  <label class="form-label" for="sFirst">First name</label>
                  <input
                    id="sFirst"
                    class="form-control"
                    autocomplete="given-name"
                    required
                  />
                </div>
                <div class="col-md-6">
                  <label class="form-label" for="sLast">Last name</label>
                  <input
                    id="sLast"
                    class="form-control"
                    autocomplete="family-name"
                    required
                  />
                </div>
                <div class="col-12">
                  <label class="form-label" for="sEmail">Email</label>
                  <input
                    id="sEmail"
                    type="email"
                    class="form-control"
                    autocomplete="email"
                    required
                  />
                </div>
                <div class="col-12">
                  <label class="form-label" for="sPass">Password</label>
                  <input
                    id="sPass"
                    type="password"
                    class="form-control"
                    autocomplete="new-password"
                    required
                  />
                </div>
                <div class="col-12" style="text-align: center;">
                  <div class="form-check">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      value=""
                      id="agreeTerms"
                      required
                    />
                    <label class="form-check-label" for="agreeTerms"
                      >I agree to the Terms & Privacy Policy</label
                    >
                  </div>
                </div>
                <div class="col-12 d-grid">
                  <button class="btn btn-primary" type="submit">
                    Create account
                  </button>
                </div>
                <div class="col-12" style="text-align: center;">
                  <div class="small text-body-secondary">
                    Already have an account? <a href="login.html">Login</a>.
                  </div>
                </div>
              </form>
              <div class="d-flex align-items-center gap-3 mb-3">
                <div class="flex-grow-1 border-top"></div>
                <div class="small text-body-secondary">or</div>
                <div class="flex-grow-1 border-top"></div>
              </div>
              <div class="row g-2 mb-3">
                <div class="col-12 d-grid">
                  <button type="button" class="btn btn-outline-secondary">
                    <span class="d-inline-flex align-items-center gap-2">
                      <svg
                        width="18"
                        height="18"
                        viewBox="0 0 24 24"
                        fill="none"
                        xmlns="http://www.w3.org/2000/svg"
                        aria-hidden="true"
                      >
                        <path
                          d="M21 12.2c0-.7-.06-1.23-.2-1.8H12v3.4h5.1c-.1.9-.7 2.2-2 3.1l-.02.11 2.77 2.15.19.02c1.76-1.63 2.96-4.03 2.96-7.11Z"
                          fill="currentColor"
                        />
                        <path
                          d="M12 22c2.52 0 4.64-.83 6.18-2.26l-2.94-2.28c-.78.55-1.84.94-3.24.94-2.47 0-4.57-1.63-5.32-3.88l-.1.01-2.87 2.22-.03.1C5.2 20.16 8.3 22 12 22Z"
                          fill="currentColor"
                        />
                        <path
                          d="M6.68 14.52A6.38 6.38 0 0 1 6.35 12c0-.88.15-1.73.33-2.52l-.01-.12-2.91-2.26-.1.05A10 10 0 0 0 2 12c0 1.61.39 3.13 1.08 4.47l3.6-1.95Z"
                          fill="currentColor"
                        />
                        <path
                          d="M12 5.6c1.74 0 2.91.75 3.58 1.38l2.61-2.54C16.63 2.97 14.52 2 12 2 8.3 2 5.2 3.84 3.07 6.74l3.6 2.74C7.43 7.23 9.53 5.6 12 5.6Z"
                          fill="currentColor"
                        />
                      </svg>
                      Continue with Google
                    </span>
                  </button>
                </div>
                <div class="col-12 d-grid">
                  <button type="button" class="btn btn-outline-secondary">
                    <span class="d-inline-flex align-items-center gap-2">
                      <svg
                        width="18"
                        height="18"
                        viewBox="0 0 24 24"
                        fill="none"
                        xmlns="http://www.w3.org/2000/svg"
                        aria-hidden="true"
                      >
                        <path
                          d="M14 9.3V7.5c0-.9.6-1.1 1-1.1h1V3.2h-2.2C11.9 3.2 11 4.6 11 6.6v2.7H9v3.1h2V21h3v-8.6h2.2l.3-3.1H14Z"
                          fill="currentColor"
                        />
                      </svg>
                      Continue with Facebook
                    </span>
                  </button>
                </div>
                <div class="col-12 d-grid">
                  <button type="button" class="btn btn-outline-secondary">
                    <span class="d-inline-flex align-items-center gap-2">
                      <svg
                        width="18"
                        height="18"
                        viewBox="0 0 24 24"
                        fill="none"
                        xmlns="http://www.w3.org/2000/svg"
                        aria-hidden="true"
                      >
                        <path
                          d="M16.2 13c0-2.2 1.8-3.2 1.9-3.3-1-1.5-2.6-1.7-3.1-1.7-1.3-.1-2.5.8-3.2.8-.6 0-1.6-.8-2.7-.8-1.4 0-2.7.8-3.4 2-1.5 2.6-.4 6.4 1 8.5.7 1 1.6 2.2 2.8 2.1 1.1 0 1.6-.7 2.9-.7 1.3 0 1.7.7 2.9.7 1.2 0 2-.9 2.7-1.9.8-1.2 1.2-2.4 1.2-2.5-.1 0-2.9-1.1-2.9-3.2Z"
                          fill="currentColor"
                        />
                        <path
                          d="M14.7 6.4c.6-.8 1-1.9.9-3-.9.04-2 .6-2.6 1.4-.6.7-1.1 1.8-1 2.9 1 .1 2.1-.5 2.7-1.3Z"
                          fill="currentColor"
                        />
                      </svg>
                      Continue with Apple
                    </span>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
