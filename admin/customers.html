<!doctype html>
<html lang="en" data-bs-theme="light" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Admin customers — contacts, notes, and booking history." />
  <title>Admin — Customers</title>
  <link rel="canonical" href="customers.html" />
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml" />

  <link id="bsLtr" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link id="bsRtl" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet" disabled />
  <link href="../assets/css/theme.css" rel="stylesheet" />
</head>
<body>
  <div class="admin-shell">
    <div id="adminSidebarHost"></div>

    <div class="admin-content">
      <div id="adminTopbarHost"></div>

      <main class="p-3 p-lg-4">
        <div class="container-fluid px-0">
          <div class="d-flex flex-column flex-lg-row align-items-lg-center justify-content-between gap-2">
            <div>
              <h1 class="h5 mb-1">Customers</h1>
              <div class="small text-body-secondary">Centralize contacts and event history.</div>
            </div>
            <div class="d-flex flex-wrap gap-2">
              <input class="form-control" style="max-width:260px" placeholder="Search customers" aria-label="Search customers" />
              <button class="btn btn-primary" type="button">Add customer</button>
            </div>
          </div>

          <div class="card card-soft mt-3">
            <div class="table-responsive">
              <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                  <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Segment</th>
                    <th class="text-end">Actions</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td class="fw-semibold">Amira Khan</td>
                    <td>amira@example.com</td>
                    <td>+1 555-010-1111</td>
                    <td><span class="badge text-bg-secondary">Wedding</span></td>
                    <td class="text-end"><button class="btn btn-outline-secondary btn-sm" type="button">Open</button></td>
                  </tr>
                  <tr>
                    <td class="fw-semibold">Nova Events Co.</td>
                    <td>ops@novaevents.example</td>
                    <td>+1 555-010-2222</td>
                    <td><span class="badge text-bg-primary">Corporate</span></td>
                    <td class="text-end"><button class="btn btn-outline-secondary btn-sm" type="button">Open</button></td>
                  </tr>
                  <tr>
                    <td class="fw-semibold">Studio 4</td>
                    <td>hello@studio4.example</td>
                    <td>+1 555-010-3333</td>
                    <td><span class="badge text-bg-success">Production</span></td>
                    <td class="text-end"><button class="btn btn-outline-secondary btn-sm" type="button">Open</button></td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>

        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/app.js"></script>
  <script src="assets/js/admin-layout.js"></script>
  <script>
    ER.mountAdmin('customers', 'Customers');
  </script>
</body>
</html>
