<!doctype html>
<html lang="en" data-bs-theme="light" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Admin quotes — review inquiries, pricing changes, and approvals." />
  <title>Admin — Quotes</title>
  <link rel="canonical" href="quotes.html" />
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml" />

  <link id="bsLtr" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link id="bsRtl" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet" disabled />
  <link href="../assets/css/theme.css" rel="stylesheet" />
</head>
<body>
  <div class="admin-shell">
    <div id="adminSidebarHost"></div>

    <div class="admin-content">
      <div id="adminTopbarHost"></div>

      <main class="p-3 p-lg-4">
        <div class="container-fluid px-0">
          <div class="d-flex flex-column flex-lg-row align-items-lg-center justify-content-between gap-2">
            <div>
              <h1 class="h5 mb-1">Quote Management</h1>
              <div class="small text-body-secondary">Track pipeline from inquiry to approved quote to booking.</div>
            </div>
            <div class="d-flex flex-wrap gap-2">
              <select class="form-select" aria-label="Filter status" style="max-width:220px">
                <option>All statuses</option>
                <option>Draft</option>
                <option>Sent</option>
                <option>Approved</option>
                <option>Rejected</option>
              </select>
              <button class="btn btn-primary" type="button">New quote</button>
            </div>
          </div>

          <div class="card card-soft mt-3">
            <div class="table-responsive">
              <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                  <tr>
                    <th>ID</th>
                    <th>Customer</th>
                    <th>Date</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th class="text-end">Actions</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td class="fw-semibold">Q-1026</td>
                    <td>Amira Khan</td>
                    <td>2026-02-12</td>
                    <td>$1,240.00</td>
                    <td><span class="badge text-bg-warning">Sent</span></td>
                    <td class="text-end">
                      <button class="btn btn-outline-secondary btn-sm" type="button">View</button>
                      <button class="btn btn-outline-primary btn-sm" type="button">Approve</button>
                    </td>
                  </tr>
                  <tr>
                    <td class="fw-semibold">Q-1027</td>
                    <td>Nova Events Co.</td>
                    <td>2026-03-01</td>
                    <td>$980.00</td>
                    <td><span class="badge text-bg-success">Approved</span></td>
                    <td class="text-end">
                      <button class="btn btn-outline-secondary btn-sm" type="button">View</button>
                      <button class="btn btn-outline-primary btn-sm" type="button">Convert</button>
                    </td>
                  </tr>
                  <tr>
                    <td class="fw-semibold">Q-1028</td>
                    <td>Studio 4</td>
                    <td>2026-03-14</td>
                    <td>$2,110.00</td>
                    <td><span class="badge text-bg-secondary">Draft</span></td>
                    <td class="text-end">
                      <button class="btn btn-outline-secondary btn-sm" type="button">Edit</button>
                      <button class="btn btn-outline-primary btn-sm" type="button">Send</button>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>

        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/app.js"></script>
  <script src="assets/js/admin-layout.js"></script>
  <script>
    ER.mountAdmin('quotes', 'Quote Management');
  </script>
</body>
</html>
