<!doctype html>
<html lang="en" data-bs-theme="light" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Admin inventory management — items, categories, stock and pricing." />
  <title>Admin — Inventory</title>
  <link rel="canonical" href="inventory.html" />
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml" />

  <link id="bsLtr" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link id="bsRtl" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet" disabled />
  <link href="../assets/css/theme.css" rel="stylesheet" />
</head>
<body>
  <div class="admin-shell">
    <div id="adminSidebarHost"></div>

    <div class="admin-content">
      <div id="adminTopbarHost"></div>

      <main class="p-3 p-lg-4">
        <div class="container-fluid px-0">
          <div class="d-flex flex-column flex-lg-row align-items-lg-center justify-content-between gap-2">
            <div>
              <h1 class="h5 mb-1">Inventory Management</h1>
              <div class="text-body-secondary small">Tables, filters, and fast edit patterns for operations.</div>
            </div>
            <div class="d-flex flex-wrap gap-2">
              <input class="form-control" style="max-width:260px" placeholder="Search items" aria-label="Search items" />
              <select class="form-select" style="max-width:220px" aria-label="Filter category">
                <option>All categories</option>
                <option>Seating</option>
                <option>Tables</option>
                <option>Linens</option>
                <option>AV</option>
                <option>Lighting</option>
                <option>Stages</option>
                <option>Tents</option>
              </select>
              <button class="btn btn-primary" type="button">Add item</button>
            </div>
          </div>

          <div class="card card-soft mt-3">
            <div id="adminInventoryTable"></div>
          </div>

          <div class="row g-3 mt-3">
            <div class="col-lg-6">
              <div class="card card-soft p-4">
                <h2 class="h6">Quick update</h2>
                <form class="row g-3" onsubmit="return false">
                  <div class="col-md-6">
                    <label class="form-label">Item</label>
                    <select class="form-select">
                      <option>Banquet Chairs</option>
                      <option>Round Tables (60\")</option>
                      <option>LED Wall (12x7)</option>
                    </select>
                  </div>
                  <div class="col-md-3">
                    <label class="form-label">Stock</label>
                    <input type="number" class="form-control" min="0" value="0" />
                  </div>
                  <div class="col-md-3">
                    <label class="form-label">Maintenance</label>
                    <input type="number" class="form-control" min="0" value="0" />
                  </div>
                  <div class="col-12 d-grid">
                    <button class="btn btn-outline-primary" type="submit">Save</button>
                  </div>
                  <div class="col-12">
                    <div class="form-hint">Demo form only. Wire up to your backend to persist inventory updates.</div>
                  </div>
                </form>
              </div>
            </div>

            <div class="col-lg-6">
              <div class="card card-soft p-4">
                <h2 class="h6">Status legend</h2>
                <div class="d-flex flex-wrap gap-2">
                  <span class="badge text-bg-success">Active</span>
                  <span class="badge text-bg-warning">Maintenance</span>
                  <span class="badge text-bg-danger">Unavailable</span>
                </div>
                <p class="text-body-secondary small mt-3 mb-0">Use consistent statuses for faster decision-making across operations.</p>
              </div>
            </div>
          </div>

        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/app.js"></script>
  <script src="assets/js/admin-layout.js"></script>
  <script src="assets/js/admin-pages.js"></script>
  <script>
    ER.mountAdmin('inventory', 'Inventory Management');
  </script>
</body>
</html>
