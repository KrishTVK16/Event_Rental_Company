<!doctype html>
<html lang="en" data-bs-theme="light" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Admin reports — utilization, revenue, and operational snapshots." />
  <title>Admin — Reports</title>
  <link rel="canonical" href="reports.html" />
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml" />

  <link id="bsLtr" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link id="bsRtl" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet" disabled />
  <link href="../assets/css/theme.css" rel="stylesheet" />
</head>
<body>
  <div class="admin-shell">
    <div id="adminSidebarHost"></div>

    <div class="admin-content">
      <div id="adminTopbarHost"></div>

      <main class="p-3 p-lg-4">
        <div class="container-fluid px-0">
          <div class="d-flex flex-column flex-lg-row align-items-lg-center justify-content-between gap-2">
            <div>
              <h1 class="h5 mb-1">Reports</h1>
              <div class="small text-body-secondary">Visibility into utilization, revenue, and operational load.</div>
            </div>
            <div class="d-flex flex-wrap gap-2">
              <select class="form-select" style="max-width:220px" aria-label="Range">
                <option>Last 7 days</option>
                <option>Last 30 days</option>
                <option>This quarter</option>
                <option>This year</option>
              </select>
              <button class="btn btn-outline-primary" type="button">Export</button>
            </div>
          </div>

          <div class="row g-3 mt-1">
            <div class="col-md-6 col-lg-4">
              <div class="card card-soft p-4">
                <div class="text-body-secondary">Revenue</div>
                <div class="h4 mb-0">$24,500</div>
              </div>
            </div>
            <div class="col-md-6 col-lg-4">
              <div class="card card-soft p-4">
                <div class="text-body-secondary">Utilization</div>
                <div class="h4 mb-0">72%</div>
              </div>
            </div>
            <div class="col-md-6 col-lg-4">
              <div class="card card-soft p-4">
                <div class="text-body-secondary">Pending payments</div>
                <div class="h4 mb-0">$1,200</div>
              </div>
            </div>
          </div>

          <div class="card card-soft p-4 mt-3">
            <h2 class="h6">Notes</h2>
            <p class="text-body-secondary mb-0">This page is a UI template for charts/tables. Connect to your analytics backend to render real reporting widgets.</p>
          </div>

        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/app.js"></script>
  <script src="assets/js/admin-layout.js"></script>
  <script>
    ER.mountAdmin('reports', 'Reports');
  </script>
</body>
</html>
